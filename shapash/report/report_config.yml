# report_config.yml
# ─────────────────────────────────────────────────────────────────────────────
# Each entry in `sections` maps to a  block_<type>  method on the report class.
# `params` are passed as keyword arguments to that method.
# Add, remove, or reorder sections freely — that is the whole point.
# ─────────────────────────────────────────────────────────────────────────────

sections:

  # ── Page title ──────────────────────────────────────────────────────────────
  - type: header
    params:
      title: "House Prices — Model Report"
      subtitle: "Prototype · block-based report engine"

  # ── Top-level callout ────────────────────────────────────────────────────────
  - type: callout
    params:
      icon: "⚠"
      body: >
        This is a prototype report. Blocks are defined in Python and
        composed here in YAML. Add, remove or reorder sections without
        touching any Python code.
      color: orange

  # ── Divider ──────────────────────────────────────────────────────────────────
  - type: divider
    params:
      label: "Project"

  # ── Project metadata ─────────────────────────────────────────────────────────
  - type: key_value
    params:
      title: "Project metadata"
      color: purple
      items:
        Author: "Alice Martin"
        Date: "2024-01-15"
        Dataset: "Kaggle — House Prices"
        Task: "Regression"
        Target: "SalePrice"

  # ── Free-text introduction ────────────────────────────────────────────────────
  - type: text
    params:
      title: "Objective"
      body: >
        The goal of this project is to predict the final sale price of residential
        homes in Ames, Iowa, using 79 explanatory variables describing almost every
        aspect of those homes.
      color: blue

  # ── Divider ──────────────────────────────────────────────────────────────────
  - type: divider
    params:
      label: "Model"

  # ── Model summary ─────────────────────────────────────────────────────────────
  - type: key_value
    params:
      title: "Model configuration"
      color: blue
      items:
        Class: "RandomForestRegressor"
        Library: "scikit-learn 1.4"
        n_estimators: 50
        max_depth: "None (unlimited)"
        random_state: 1

  # ── Key metrics as badges ─────────────────────────────────────────────────────
  - type: badge_row
    params:
      title: "Performance snapshot"
      badges:
        - label: MAE
          value: "18 432 $"
          color: green
        - label: RMSE
          value: "27 891 $"
          color: blue
        - label: R²
          value: "0.874"
          color: purple
        - label: Train size
          value: "1 095 rows"
          color: gray
        - label: Test size
          value: "365 rows"
          color: gray

  # ── Divider ──────────────────────────────────────────────────────────────────
  - type: divider
    params:
      label: "Explainability"

  # ── Top features — plain text block (no chart yet) ────────────────────────────
  - type: text
    params:
      title: "Top contributing features"
      body: >
        Based on mean absolute SHAP values computed on the test set,
        the three most influential features are OverallQual (overall material
        and finish quality), GrLivArea (above-grade living area in sq ft),
        and TotalBsmtSF (total basement area in sq ft).
      color: green

  # ── Feature importance as key/value table ─────────────────────────────────────
  - type: key_value
    params:
      title: "Mean |SHAP| — top 5 features"
      color: green
      items:
        OverallQual: "0.412"
        GrLivArea: "0.289"
        TotalBsmtSF: "0.174"
        GarageCars: "0.121"
        YearBuilt: "0.098"

  # ── Divider ──────────────────────────────────────────────────────────────────
  - type: divider
    params:
      label: "Notes"

  # ── Custom block example (commented out — shows the extension point) ──────────
  # - type: custom
  #   function: "my_module.render_scatter_plot"
  #   params:
  #     x_col: GrLivArea
  #     y_col: SalePrice

  # ── Closing note ─────────────────────────────────────────────────────────────
  - type: callout
    params:
      icon: "💡"
      body: >
        To add a new section, define a  block_my_section()  method in a
        subclass of ReportBase — or point a  type: custom  entry at any
        importable Python function. No other changes needed.
      color: purple